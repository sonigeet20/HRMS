<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HRMS Agent – Login</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", sans-serif;
      background: linear-gradient(135deg, #1e3a5f 0%, #2563eb 100%);
      color: #1e293b;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: white;
      border-radius: 16px;
      padding: 40px 32px;
      width: 360px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      text-align: center;
    }
    .logo {
      width: 64px; height: 64px;
      background: #2563eb;
      border-radius: 14px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 28px;
      font-weight: 800;
      margin-bottom: 16px;
    }
    h1 { font-size: 22px; font-weight: 700; margin-bottom: 4px; }
    .subtitle { color: #64748b; font-size: 14px; margin-bottom: 28px; }
    .form-group { text-align: left; margin-bottom: 16px; }
    label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 6px; color: #374151; }
    input {
      width: 100%; padding: 10px 14px;
      border: 1.5px solid #d1d5db; border-radius: 10px;
      font-size: 14px; outline: none;
      transition: border-color 0.2s;
    }
    input:focus { border-color: #2563eb; box-shadow: 0 0 0 3px rgba(37,99,235,0.1); }
    .btn {
      width: 100%; padding: 12px;
      background: #2563eb; color: white;
      border: none; border-radius: 10px;
      font-size: 15px; font-weight: 600;
      cursor: pointer; transition: background 0.2s;
      margin-top: 8px;
    }
    .btn:hover { background: #1d4ed8; }
    .btn:disabled { background: #93c5fd; cursor: not-allowed; }
    .msg { margin-top: 16px; font-size: 13px; padding: 10px; border-radius: 8px; display: none; }
    .msg.error { display: block; background: #fef2f2; color: #dc2626; border: 1px solid #fecaca; }
    .msg.success { display: block; background: #f0fdf4; color: #16a34a; border: 1px solid #bbf7d0; }
    .info { margin-top: 20px; font-size: 12px; color: #94a3b8; line-height: 1.5; }
    .spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid #fff; border-top-color: transparent; border-radius: 50%; animation: spin 0.6s linear infinite; vertical-align: middle; margin-right: 6px; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">H</div>
    <h1>HRMS Agent</h1>
    <p class="subtitle">Sign in with your company credentials</p>

    <div class="form-group">
      <label for="email">Email Address</label>
      <input type="email" id="email" placeholder="you@company.com" autocomplete="email" />
    </div>
    <div class="form-group">
      <label for="password">Password</label>
      <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" />
    </div>

    <button class="btn" id="loginBtn" onclick="doLogin()">Sign In</button>

    <div class="msg" id="msg"></div>

    <p class="info">
      This agent tracks your attendance automatically.<br/>
      It runs quietly in your system tray after login.
    </p>
  </div>

  <script>
    const API_BASE = 'https://zgemsjtztpwlhaltsvex.supabase.co';
    const ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpnZW1zanR6dHB3bGhhbHRzdmV4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE4NDQ5MDcsImV4cCI6MjA4NzQyMDkwN30.sgFrO1VSiQ_MC9Cn0hgNfXacB1rZCgTZIpb8BLw4leU';

    async function doLogin() {
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const btn = document.getElementById('loginBtn');
      const msg = document.getElementById('msg');

      if (!email || !password) {
        msg.className = 'msg error';
        msg.textContent = 'Please enter your email and password.';
        return;
      }

      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span>Signing in...';
      msg.className = 'msg'; msg.style.display = 'none';

      try {
        const res = await fetch(`${API_BASE}/auth/v1/token?grant_type=password`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'apikey': ANON_KEY,
          },
          body: JSON.stringify({ email, password }),
        });

        const data = await res.json();

        if (!res.ok) {
          throw new Error(data.error_description || data.msg || 'Invalid credentials');
        }

        // Send token to Tauri backend
        if (window.__TAURI__) {
          await window.__TAURI__.invoke('set_auth_token', {
            accessToken: data.access_token,
            refreshToken: data.refresh_token,
            email: email,
          });
        }

        msg.className = 'msg success';
        msg.textContent = '✓ Signed in! The agent is now running in your system tray.';

        // Hide window after short delay
        setTimeout(() => {
          if (window.__TAURI__) {
            window.__TAURI__.window.getCurrent().hide();
          }
        }, 1500);

      } catch (err) {
        msg.className = 'msg error';
        msg.textContent = err.message || 'Login failed. Please try again.';
      } finally {
        btn.disabled = false;
        btn.textContent = 'Sign In';
      }
    }

    // Allow Enter key to submit
    document.getElementById('password').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') doLogin();
    });
    document.getElementById('email').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') document.getElementById('password').focus();
    });
  </script>
</body>
</html>
